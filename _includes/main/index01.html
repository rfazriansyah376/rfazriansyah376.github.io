<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <script>
    (function() {
        var hostname = location.hostname;
        var parts = hostname.split(".");
        var fullName = parts[0];
        if (fullName.toLowerCase() === "www") fullName = parts[1] || fullName;

        var formatText = function(str) {
            return str.replace(/[-_]/g, " ").replace(/\+/g, " ").replace(/\b\w/g, function(c) { return c.toUpperCase(); });
        };

        var displayDomain = formatText(fullName);
        document.title = displayDomain + " - Beautiful Girls Photo Gallery";

        var metaDesc = document.querySelector("meta[name=\"description\"]") || document.createElement("meta");
        metaDesc.name = "description";
        metaDesc.content = displayDomain + " - Stunning collection of beautiful girls photography from around the world. Explore elegant portraits, glamour shots, and captivating beauty galleries.";
        if (!metaDesc.parentNode) document.head.appendChild(metaDesc);

        var metaAuthor = document.querySelector("meta[name=\"author\"]") || document.createElement("meta");
        metaAuthor.name = "author";
        metaAuthor.content = displayDomain;
        if (!metaAuthor.parentNode) document.head.appendChild(metaAuthor);

        var canonical = document.querySelector("link[rel=\"canonical\"]") || document.createElement("link");
        canonical.setAttribute("rel", "canonical");
        canonical.setAttribute("href", location.href);
        if (!canonical.parentNode) document.head.appendChild(canonical);

        var schemaData = {
            "@context": "https://schema.org",
            "@type": "WebSite",
            "name": displayDomain,
            "description": "Beautiful girls photo gallery from around the world",
            "url": location.origin
        };
        var schemaScript = document.createElement("script");
        schemaScript.type = "application/ld+json";
        schemaScript.textContent = JSON.stringify(schemaData);
        document.head.appendChild(schemaScript);
    })();
    </script>

    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1">

<body>
<div loading="lazy">

    <script>
    (function(){
        var host = window.location.hostname.split(".");
        var sub = host[0];
        if (sub.toLowerCase() === "www") sub = host[1] || "";
        var clean = sub.replace(/-/g, " ");
        var title = clean.replace(/\b\w/g, function(c) { return c.toUpperCase(); });
        document.getElementById("blogMainTitle").textContent = title;
    })();

    var toggleBtnBlog = document.getElementById("blogMenuToggle");
    var menuPanelBlog = document.getElementById("blogMenuPanel");
    var iconMenuBlog = document.getElementById("blogIconMenu");
    var iconCloseBlog = document.getElementById("blogIconClose");

    toggleBtnBlog.addEventListener("click", function(e) {
        e.stopPropagation();
        var isVisible = menuPanelBlog.style.display === "block";
        menuPanelBlog.style.display = isVisible ? "none" : "block";
        iconMenuBlog.style.display = isVisible ? "inline" : "none";
        iconCloseBlog.style.display = isVisible ? "none" : "inline";
        toggleBtnBlog.setAttribute("aria-label", isVisible ? "Open menu" : "Close menu");
        if (!isVisible) {
            var btnRect = toggleBtnBlog.getBoundingClientRect();
            menuPanelBlog.style.top = (btnRect.bottom + 5) + "px";
            menuPanelBlog.style.right = (window.innerWidth - btnRect.right) + "px";
        }
    });

    document.addEventListener("click", function(e) {
        if (!menuPanelBlog.contains(e.target) && !toggleBtnBlog.contains(e.target) && menuPanelBlog.style.display === "block") {
            menuPanelBlog.style.display = "none";
            iconMenuBlog.style.display = "inline";
            iconCloseBlog.style.display = "none";
            toggleBtnBlog.setAttribute("aria-label", "Open menu");
        }
    });

    document.addEventListener("keydown", function(e) {
        if (e.key === "Escape" && menuPanelBlog.style.display === "block") {
            menuPanelBlog.style.display = "none";
            iconMenuBlog.style.display = "inline";
            iconCloseBlog.style.display = "none";
            toggleBtnBlog.setAttribute("aria-label", "Open menu");
            toggleBtnBlog.focus();
        }
    });

    function updateBlogMenuPosition() {
        if (menuPanelBlog.style.display === "block") {
            var btnRect = toggleBtnBlog.getBoundingClientRect();
            menuPanelBlog.style.top = (btnRect.bottom + 5) + "px";
            menuPanelBlog.style.right = (window.innerWidth - btnRect.right) + "px";
        }
    }
    window.addEventListener("resize", updateBlogMenuPosition);
    window.addEventListener("scroll", updateBlogMenuPosition);
    window.addEventListener("load", updateBlogMenuPosition);
    </script>

    <script>
    (function() {
        var hostname = window.location.hostname;
        var parts = hostname.split(".");
        var fullName = parts[0];
        if (fullName.toLowerCase() === "www") fullName = parts[1] || fullName;

        function hashString(str) {
            var hash = 0;
            for (var i = 0; i < str.length; i++) { hash = ((hash << 5) - hash) + str.charCodeAt(i); hash |= 0; }
            return Math.abs(hash);
        }
        var domainHash = hashString(fullName);

        var clean = fullName.replace(/-/g, " ");
        var words = clean.split(" "), initials = "";
        for (var w = 0; w < Math.min(words.length, 3); w++) { if (words[w].length > 0) initials += words[w].charAt(0).toUpperCase(); }
        if (initials.length < 2) initials = fullName.substring(0, 3).toUpperCase();

        var hue = domainHash % 360;
        var avatarBg = "hsl(" + hue + ",60%,50%)";
        document.getElementById("domainAvatar").innerHTML = "<svg width=\"30\" height=\"30\" viewBox=\"0 0 30 30\" aria-hidden=\"true\"><rect width=\"30\" height=\"30\" rx=\"15\" fill=\"" + avatarBg + "\"/><text x=\"15\" y=\"20\" text-anchor=\"middle\" fill=\"#fff\" font-size=\"13\" font-weight=\"bold\" font-family=\"sans-serif\">" + initials + "</text></svg>";

        var displayDomain = clean.replace(/\b\w/g, function(c) { return c.toUpperCase(); });

        var allImages = document.querySelectorAll(".home-grid-thumb img");
        if (allImages.length > 0) {
            var firstImg = allImages[0];
            var imgSchema = {
                "@context": "https://schema.org",
                "@type": "ImageObject",
                "contentUrl": firstImg.src,
                "name": (firstImg.alt || displayDomain) + " - " + displayDomain,
                "description": "Beautiful girl photo gallery at " + displayDomain,
                "creditText": displayDomain
            };
            var imgScript = document.createElement("script");
            imgScript.type = "application/ld+json";
            imgScript.textContent = JSON.stringify(imgSchema);
            document.head.appendChild(imgScript);
        }

        document.querySelectorAll(".home-grid-thumb img").forEach(function(img) {
            if (img.alt && img.alt.trim() !== "") {
                img.alt = img.alt + " - " + displayDomain;
            }
        });
    })();
    </script>

    <div class="homepage-container">

        <div id="homeFeaturedWrap" class="section-order">

                <!-- Kolom akan diisi oleh JavaScript -->

    <script>
    (function() {
        var allItems = [];
        
        {% assign total_posts = 50 %}
        {% assign banner_spacing = total_posts | divided_by: 8 %}
        {% assign remainder = total_posts | modulo: 8 %}
        
        {% assign banner_counter = 0 %}
        {% assign next_banner_at = banner_spacing | plus: 1 %}
        {% assign offset_counter = 0 %}
        
        {% for post in site.posts limit:50 %}
            allItems.push({
                type: 'card',
                image: '{{ post.image | relative_url }}',
                url: '{{ post.url }}',
                title: '{{ post.title | escape }}',
                description: '{{ post.description | default: "" | escape }}',
                alt: '{{ post.title | escape }}'
            });
            
            {% if forloop.index == next_banner_at and banner_counter < 8 %}
                {% assign banner_counter = banner_counter | plus: 1 %}
                allItems.push({
                    type: 'banner',
                    bannerNum: {{ banner_counter }}
                });
                
                {% assign offset_counter = offset_counter | plus: 1 %}
                {% if offset_counter <= remainder %}
                    {% assign next_banner_at = next_banner_at | plus: banner_spacing | plus: 1 %}
                {% else %}
                    {% assign next_banner_at = next_banner_at | plus: banner_spacing %}
                {% endif %}
            {% endif %}
        {% endfor %}
        
        // Fungsi untuk membuat elemen card
        function createCard(item) {
            var wrapper = document.createElement('div');
            wrapper.className = 'masonry-item';
            wrapper.innerHTML = 
                '<div class="home-grid-card">' +
                    (item.image ? 
                    '<div class="home-grid-thumb">' +
                        '<a href="' + item.url + '" aria-label="' + item.alt + '">' +
                            '<img src="' + item.image + '" alt="' + item.alt + '" loading="lazy" decoding="async">' +
                        '</a>' +
                    '</div>' : '') +
                    '<div class="home-grid-content">' +
                        '<h2 class="home-grid-title">' +
                            '<a href="' + item.url + '">' + item.title + '</a>' +
                        '</h2>' +
                        (item.description ? '<p class="home-grid-desc">' + item.description + '</p>' : '') +
                    '</div>' +
                '</div>';
            return wrapper;
        }
        
        // Fungsi untuk membuat elemen banner
        function createBanner(bannerNum) {
            var wrapper = document.createElement('div');
            wrapper.className = 'masonry-banner-item';
            wrapper.innerHTML = 
                '<div class="home-grid-banner">' +
                    '<!-- {% include /ads/banner/' + String(bannerNum).padStart(2, '0') + '.html %} -->' +
                    '<span style="color:#555;font-size:12px">Ad Banner ' + String(bannerNum).padStart(2, '0') + '</span>' +
                '</div>';
            return wrapper;
        }
        
        // Fungsi dapatkan jumlah kolom
        function getColumnCount() {
            var w = window.innerWidth;
            if (w >= 1800) return 8;
            if (w >= 1400) return 7;
            if (w >= 1100) return 6;
            if (w >= 769) return 5;
            if (w >= 481) return 3;
            return 2;
        }
        
        // Fungsi distribusi item ke kolom
        function distributeItems() {
            var grid = document.getElementById('masonryGrid');
            var colCount = getColumnCount();
            
            // Hapus semua kolom lama
            grid.innerHTML = '';
            
            // Buat kolom baru
            var columns = [];
            for (var i = 0; i < colCount; i++) {
                var col = document.createElement('div');
                col.className = 'masonry-column';
                grid.appendChild(col);
                columns.push(col);
            }
            
            // Distribusi item — pakai shortest column
            var colHeights = new Array(colCount).fill(0);
            
            allItems.forEach(function(item, index) {
                var shortestCol = colHeights.indexOf(Math.min.apply(null, colHeights));
                var element;
                
                if (item.type === 'banner') {
                    element = createBanner(item.bannerNum);
                } else {
                    element = createCard(item);
                }
                
                columns[shortestCol].appendChild(element);
                
                // Estimasi tinggi — banner selalu lebih pendek dari gambar
                var estimatedHeight;
                if (item.type === 'banner') {
                    estimatedHeight = 100;
                } else {
                    estimatedHeight = 250 + (Math.random() * 200);
                }
                colHeights[shortestCol] += estimatedHeight;
            });
        }
        
        // Inisialisasi
        distributeItems();
        
        // Re-layout saat resize
        var resizeTimeout;
        window.addEventListener('resize', function() {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(distributeItems, 200);
        });
        
        // Re-layout setelah gambar load
        window.addEventListener('load', function() {
            setTimeout(distributeItems, 500);
            setTimeout(distributeItems, 1500);
        });
        
    })();
    </script>
