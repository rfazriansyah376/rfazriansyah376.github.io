<script>
(function() {
    // ========== KONFIGURASI ==========
    var daftarLink = [
        "https://bony-teaching.com/uQ9XsN",
        "https://omg10.com/4/11104875",
        "https://omg10.com/4/11104880"
    ];
    var delayPopup = 1000;      // 1 detik sebelum popup Mailchimp muncul
    var jedaPopunder = 86400000; // 24 jam sebelum popunder muncul lagi
    // =================================

    // ========== POPUP MAILCHIMP ==========
    var popupForm = document.getElementById("popupForm");
    var popupOverlay = document.getElementById("popupOverlay");
    var closeBtn = document.getElementById("closePopup");

    function showPopup() {
        if (popupForm && popupOverlay) {
            popupForm.style.display = "block";
            popupOverlay.style.display = "block";
        }
    }

    function hidePopup() {
        if (popupForm && popupOverlay) {
            popupForm.style.display = "none";
            popupOverlay.style.display = "none";
        }
    }

    if (closeBtn) {
        closeBtn.onclick = hidePopup;
    }
    if (popupOverlay) {
        popupOverlay.onclick = hidePopup;
    }

    // Tampilkan popup setelah delay
    setTimeout(showPopup, delayPopup);

    // ========== POPUNDER ANTI-BLOKIR ==========
    // Cek apakah sudah muncul dalam 24 jam terakhir
    var puShown = localStorage.getItem('pu_shown');
    var puTime = localStorage.getItem('pu_time');
    if (puShown && puTime && (Date.now() - parseInt(puTime)) < jedaPopunder) {
        return; // Belum waktunya, tidak pasang listener
    }

    var sudahJalan = false;

    function linkAcak() {
        return daftarLink[Math.floor(Math.random() * daftarLink.length)];
    }

    function bukaPopunder(e) {
        if (sudahJalan) return;

        // Jangan curi klik dari popup Mailchimp
        if (e.target.closest('#popupForm')) return;

        // Jangan curi klik dari link, button, input, form
        if (e.target.closest('a, button, input, textarea, select, form')) return;

        sudahJalan = true;

        var w = window.open(linkAcak(), "_blank", "width=800,height=600");

        if (w) {
            try {
                w.blur();
                window.focus();
            } catch (e) {}

            localStorage.setItem('pu_shown', '1');
            localStorage.setItem('pu_time', Date.now().toString());
        }

        document.removeEventListener('click', bukaPopunder);
    }

    document.addEventListener('click', bukaPopunder);

})();
</script>
