<script>
(function(){
    // ============================================================
    //  ADBLOCK DETECTOR + CONTENT LOCKER - UNIVERSAL VERSION
    //  Works: HTML locker exists | HTML locker missing | Any condition
    // ============================================================
    
    var isAdBlock = false;
    var isChecked = false;
    var lockerReady = false;
    
    // ---------- SAFETY: Tunggu DOM benar-benar siap ----------
    function waitForDOM(callback) {
        if (document.readyState === 'complete' || document.readyState === 'interactive') {
            callback();
        } else {
            document.addEventListener('DOMContentLoaded', callback);
        }
    }
    
    // ---------- DETEKSI ADBLOCK (3 LAPIS) ----------
    function detectAdBlock(callback) {
        if (isChecked) {
            callback(isAdBlock);
            return;
        }
        
        // Cek session storage dulu
        if (sessionStorage.getItem('clx9_adblock_ok') === 'true') {
            isChecked = true;
            isAdBlock = false;
            callback(false);
            return;
        }
        
        var detected = false;
        var testCount = 0;
        var maxTests = 3;
        
        function runTest() {
            testCount++;
            var testAd = document.createElement('div');
            testAd.className = 'adsbox';
            testAd.style.cssText = 'position:absolute;left:-9999px;height:1px;width:1px;';
            document.body.appendChild(testAd);
            
            var testAd2 = document.createElement('div');
            testAd2.id = 'clx9-bait-' + Date.now();
            testAd2.style.cssText = 'position:absolute;left:-9999px;height:1px;width:1px;';
            testAd2.innerHTML = '&nbsp;';
            document.body.appendChild(testAd2);
            
            setTimeout(function() {
                var fail = false;
                if (testAd.offsetHeight === 0 || testAd.offsetParent === null) fail = true;
                if (document.getElementById(testAd2.id) === null) fail = true;
                
                testAd.remove();
                if (testAd2.parentNode) testAd2.remove();
                
                if (fail) {
                    detected = true;
                } else if (testCount < maxTests) {
                    // Coba lagi (anti bypass)
                    setTimeout(runTest, 300);
                    return;
                }
                
                isChecked = true;
                isAdBlock = detected;
                
                if (!detected) {
                    sessionStorage.setItem('clx9_adblock_ok', 'true');
                }
                
                callback(detected);
            }, 800);
        }
        
        runTest();
    }
    
    // ---------- TAMPILAN PERINGATAN (ADBLOCK) ----------
    function showAdBlockWarning() {
        // Hapus locker lama kalau ada
        var old = document.getElementById('clx9-content-lock');
        if (old) old.remove();
        
        // Ambil warna dari CSS (atau default)
        var root = document.documentElement;
        var cardBg = getComputedStyle(root).getPropertyValue('--clx9-card-bg').trim() || '#1a1a2e';
        var accent = getComputedStyle(root).getPropertyValue('--clx9-accent').trim() || '#f5a623';
        var titleColor = getComputedStyle(root).getPropertyValue('--clx9-title-color').trim() || '#ffffff';
        var descColor = getComputedStyle(root).getPropertyValue('--clx9-desc-color').trim() || '#aaaaaa';
        var borderColor = getComputedStyle(root).getPropertyValue('--clx9-card-border').trim() || '#333333';
        var overlayBg = getComputedStyle(root).getPropertyValue('--clx9-overlay-bg').trim() || 'rgba(0,0,0,0.92)';
        
        var wall = document.createElement('div');
        wall.id = 'clx9-content-lock';
        wall.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100vh;background:'+overlayBg+';z-index:999999999;display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;padding:20px;box-sizing:border-box;';
        wall.innerHTML = `
            <div style="max-width:440px;width:100%;background:${cardBg};padding:32px 28px;border-radius:20px;text-align:center;border:1px solid ${borderColor};box-shadow:0 20px 60px rgba(0,0,0,0.6);">
                <div style="font-size:64px;margin-bottom:12px;"></div>
                <h2 style="color:${titleColor};font-size:22px;margin:0 0 8px;font-weight:700;">AdBlock Detected!</h2>
                <p style="color:${descColor};font-size:14px;line-height:1.6;margin:0 0 20px;">
                    This content is locked because you are using an ad blocker.<br>
                    Please <strong style="color:${accent};">disable AdBlock</strong> and refresh to continue.
                </p>
                <div style="background:rgba(255,255,255,0.04);border-radius:12px;padding:16px;margin:0 0 20px;text-align:left;font-size:13px;color:${descColor};border:1px solid ${borderColor};">
                    <strong style="color:${titleColor};">How to disable:</strong><br>
                    1. Click the AdBlock extension icon in your browser<br>
                    2. Select <strong style="color:${accent};">"Pause"</strong> or <strong style="color:${accent};">"Disable on this site"</strong><br>
                    3. Click the refresh button below
                </div>
                <button onclick="location.reload()" style="background:${accent};border:none;padding:14px 44px;border-radius:50px;font-size:16px;font-weight:700;color:${titleColor};cursor:pointer;transition:all 0.2s;box-shadow:0 4px 20px ${accent}44;">
                     Refresh Page
                </button>
                <p style="font-size:11px;color:${descColor}55;margin-top:16px;">
                    Or support via <a href="#" style="color:${accent};text-decoration:none;">Buy Me a Coffee</a>
                </p>
            </div>
        `;
        document.body.innerHTML = '';
        document.body.appendChild(wall);
        document.documentElement.classList.add('clx9-no-scroll');
        document.body.classList.add('clx9-no-scroll');
    }
    
    // ---------- FUNGSI UNLOCK ----------
    window.clx9Unlock = function() {
        var locker = document.getElementById('clx9-content-lock');
        if (locker) locker.remove();
        document.documentElement.classList.remove('clx9-no-scroll');
        document.body.classList.remove('clx9-no-scroll');
        
        var content = document.getElementById('clx9-protected-content');
        if (content) content.style.display = 'block';
    };
    
    // ---------- FUNGSI FAKE SKIP ----------
    window.clx9FakeSkip = function() {
        var popup = document.getElementById('clx9-skip-popup');
        if (popup) {
            popup.style.display = 'block';
            popup.classList.remove('clx9-pop-animate');
            void popup.offsetWidth;
            popup.classList.add('clx9-pop-animate');
            setTimeout(function(){ popup.style.display = 'none'; }, 2000);
        }
        if (navigator.vibrate) navigator.vibrate([10,30,10]);
    };
    
    // ---------- FUNGSI NEXT STEP ----------
    var stepCount = 0;
    var totalSteps = 0;
    var isProcessing = false;
    
    window.clx9NextStep = function() {
        if (isProcessing || stepCount >= totalSteps) return;
        isProcessing = true;
        
        var btn = document.getElementById('clx9-next-btn');
        if (btn) { btn.disabled = true; btn.innerHTML = 'Processing...'; }
        
        // Ambil total steps
        if (totalSteps === 0) {
            var tsEl = document.getElementById('clx9-total-steps');
            if (tsEl) totalSteps = parseInt(tsEl.textContent) || 10;
            else totalSteps = 10;
        }
        
        // Animasi progress
        var bar = document.getElementById('clx9-bar');
        var percent = document.getElementById('clx9-percent');
        var status = document.getElementById('clx9-status');
        var spinnerText = document.getElementById('clx9-spinner-text');
        var stepNum = document.getElementById('clx9-step-num');
        
        var startTime = Date.now();
        var duration = 3000;
        
        if (spinnerText) {
            var SP = ["Connecting...","Fetching...","Decrypting...","Securing...","Loading...","Preparing...","Almost ready...","Finalizing...","Optimizing...","Verifying..."];
            spinnerText.textContent = SP[Math.floor(Math.random() * SP.length)];
        }
        
        if (bar) { bar.style.width = '0%'; bar.style.animation = 'none'; bar.offsetHeight; bar.style.animation = 'clx9-load 3s ease-in-out forwards'; }
        if (percent) percent.textContent = '0%';
        
        var interval = setInterval(function() {
            var elapsed = Date.now() - startTime;
            var progress = Math.min(Math.round((elapsed / duration) * 100), 100);
            if (percent) percent.textContent = progress + '%';
            if (status) status.textContent = progress + '%';
            
            if (progress >= 100) {
                clearInterval(interval);
                
                stepCount++;
                if (stepNum) stepNum.textContent = stepCount;
                
                var p = Math.round((stepCount / totalSteps) * 100);
                if (bar) { bar.style.width = p + '%'; bar.style.animation = 'none'; }
                if (percent) {
                    var RW = ["Initializing...","Scanning...","Detected...","Bypassing...","Decrypting...","Almost done...","Preparing...","Finalizing...","Ready!","Granted!"];
                    var idx = Math.min(Math.floor((stepCount / totalSteps) * 9), 9);
                    percent.textContent = RW[idx];
                }
                if (spinnerText) spinnerText.textContent = 'Ready for next step';
                if (navigator.vibrate) navigator.vibrate(12);
                
                if (stepCount >= totalSteps) {
                    finishLocker();
                    return;
                }
                
                if (btn) {
                    btn.disabled = false;
                    btn.innerHTML = 'Verify & Continue <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>';
                }
                isProcessing = false;
            }
        }, 50);
    };
    
    // ---------- FINISH LOCKER ----------
    function finishLocker() {
        var elements = ['clx9-skip-btn','clx9-next-btn','clx9-progress-wrap','clx9-progress-text-wrap','clx9-step-badge','clx9-step-label','clx9-traffic','clx9-desc','clx9-icon-wrap','clx9-spinner-wrap'];
        elements.forEach(function(id) {
            var el = document.getElementById(id);
            if (el) el.style.display = 'none';
        });
        
        var title = document.getElementById('clx9-title');
        if (title) { title.textContent = 'Thank You!'; title.style.color = 'var(--clx9-traffic-color, #4ade80)'; }
        
        var finish = document.getElementById('clx9-finish');
        if (finish) {
            finish.innerHTML = '<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--clx9-traffic-color, #4ade80)" stroke-width="2.5" style="margin-bottom:6px;"><circle cx="12" cy="12" r="10"/><polyline points="16 10 11 15 8 12"/></svg><br><span style="color:var(--clx9-desc-color, #aaa);font-size:12px;">You may now access the private content.</span><br><br><button onclick="clx9Unlock()" style="padding:12px 28px;border:0;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;background:linear-gradient(135deg,var(--clx9-accent, #f5a623),var(--clx9-accent-dark, #d4901a));color:var(--clx9-btn-text, #fff);">Continue to Content </button>';
        }
        if (navigator.vibrate) navigator.vibrate([15,50,15]);
    }
    
    // ---------- INISIALISASI LOCKER ----------
    function initLocker() {
        if (lockerReady) return;
        lockerReady = true;
        
        // Cek apakah elemen locker ada di HTML
        var lockerHTML = document.getElementById('clx9-content-lock');
        
        if (!lockerHTML) {
            // LOCKER TIDAK ADA DI HTML - BUAT DARI JS
            var container = document.createElement('div');
            container.id = 'clx9-content-lock';
            container.innerHTML = `
                <div id="clx9-card" class="clx9-lock-card">
                    <div id="clx9-top-section">
                        <div class="clx9-icon" id="clx9-icon-wrap">
                            <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="var(--clx9-accent, #f5a623)" stroke-width="1.8"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/><circle cx="12" cy="16" r="1"/></svg>
                        </div>
                        <div id="clx9-title" class="clx9-title">Exclusive Content</div>
                        <div id="clx9-desc" class="clx9-desc">Complete verification to reveal this private content.</div>
                        <div id="clx9-step-badge"><span id="clx9-step-num">1</span><span id="clx9-step-divider">/</span><span id="clx9-total-steps">10</span></div>
                        <div id="clx9-step-label">Steps to unlock</div>
                    </div>
                    <div id="clx9-spinner-wrap">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--clx9-accent, #f5a623)" stroke-width="2.5" class="clx9-spinner"><circle cx="12" cy="12" r="10" stroke="var(--clx9-progress-bg, #333)" stroke-width="2.5"/><path d="M12 2a10 10 0 0 1 10 10" stroke-linecap="round"/></svg>
                        <div id="clx9-spinner-text">Preparing your content...</div>
                    </div>
                    <div class="clx9-progress" id="clx9-progress-wrap"><div id="clx9-bar"></div></div>
                    <div id="clx9-progress-text-wrap"><span id="clx9-percent">Initializing...</span><span id="clx9-status">0%</span></div>
                    <div id="clx9-traffic" class="clx9-traffic"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--clx9-traffic-color, #4ade80)" stroke-width="2.5" style="vertical-align:middle;margin-right:4px;"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="2" fill="var(--clx9-traffic-color, #4ade80)"/></svg><span id="clx9-traffic-text">Loading...</span></div>
                    <button id="clx9-next-btn" onclick="clx9NextStep()" type="button">Verify & Continue <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></button>
                    <button id="clx9-skip-btn" onclick="clx9FakeSkip()" type="button">Skip</button>
                    <div id="clx9-finish"></div>
                    <div id="clx9-skip-popup" class="clx9-skip-popup" style="display:none;">Complete all steps first</div>
                </div>
            `;
            document.body.appendChild(container);
            
            // Inject minimal style
            var style = document.createElement('style');
            style.textContent = `
                #clx9-content-lock{position:fixed;top:0;left:0;width:100%;height:100vh;z-index:999999999;display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;padding:8px;background:var(--clx9-overlay-bg,rgba(0,0,0,0.9));}
                .clx9-lock-card{width:100%;max-width:380px;background:var(--clx9-card-bg,#1a1a2e);padding:18px 14px;border-radius:16px;text-align:center;border:1px solid var(--clx9-card-border,#333);color:var(--clx9-text-primary,#fff);}
                .clx9-title{color:var(--clx9-title-color,#fff);font-size:19px;font-weight:700;margin:6px 0 2px;}
                .clx9-desc{color:var(--clx9-desc-color,#aaa);font-size:12px;margin-bottom:8px;}
                #clx9-step-badge{display:inline-flex;align-items:center;gap:6px;background:var(--clx9-accent,#f5a623);color:var(--clx9-btn-text,#fff);padding:8px 16px;border-radius:30px;font-weight:700;font-size:28px;margin:8px 0;}
                #clx9-step-label{color:var(--clx9-desc-color,#aaa);font-size:11px;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
                .clx9-spinner{animation:clx9-spin 0.9s linear infinite;}
                @keyframes clx9-spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
                #clx9-spinner-text{color:var(--clx9-desc-color,#aaa);font-size:11px;margin-top:6px;}
                .clx9-progress{height:6px;background:var(--clx9-progress-bg,#333);border-radius:10px;overflow:hidden;margin:6px 0 4px;}
                #clx9-bar{height:100%;width:0%;background:linear-gradient(90deg,var(--clx9-accent,#f5a623),var(--clx9-accent-light,#f7b84d));border-radius:10px;transition:width 0.15s linear;}
                @keyframes clx9-load{0%{width:0%}100%{width:100%}}
                #clx9-progress-text-wrap{display:flex;justify-content:space-between;margin:0 0 2px;}
                #clx9-percent{color:var(--clx9-accent-light,#f7b84d);font-size:12px;font-weight:600;}
                #clx9-status{color:var(--clx9-desc-color,#aaa);font-size:11px;}
                #clx9-next-btn{margin-top:8px;padding:12px 20px;border:0;border-radius:10px;cursor:pointer;font-size:14px;font-weight:600;background:linear-gradient(135deg,var(--clx9-accent,#f5a623),var(--clx9-accent-dark,#d4901a));color:var(--clx9-btn-text,#fff);display:inline-flex;align-items:center;justify-content:center;gap:6px;width:100%;transition:all 0.2s;}
                #clx9-next-btn:disabled{opacity:0.5;cursor:not-allowed;}
                #clx9-skip-btn{background:none;border:none;color:var(--clx9-skip-color,#888);font-size:10px;cursor:pointer;margin-top:6px;text-decoration:underline;opacity:0.7;padding:2px;}
                .clx9-skip-popup{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);background:#ef4444;color:#fff;font-size:10px;padding:5px 12px;border-radius:12px;font-weight:600;white-space:nowrap;z-index:10;display:none;}
                .clx9-pop-animate{animation:clx9-pop 2s ease forwards;}
                @keyframes clx9-pop{0%{opacity:0;transform:translateX(-50%) translateY(6px)}20%{opacity:1;transform:translateX(-50%) translateY(0)}80%{opacity:1}100%{opacity:0}}
                .clx9-traffic{color:var(--clx9-desc-color,#aaa);font-size:11px;margin:4px 0;}
                #clx9-finish{margin:4px 0;}
                .clx9-no-scroll{overflow:hidden!important;position:fixed!important;width:100%!important;height:100%!important;}
            `;
            document.head.appendChild(style);
        }
        
        // Set warna dinamis dari hostname (seperti script asli)
        setDynamicColors();
        
        // Set total steps (random 7-12)
        var tsEl = document.getElementById('clx9-total-steps');
        if (tsEl) {
            totalSteps = Math.floor(Math.random() * 6) + 7;
            tsEl.textContent = totalSteps;
        }
        
        // Set traffic (random)
        var trafficEl = document.getElementById('clx9-traffic-text');
        if (trafficEl) {
            var base = Math.floor(Math.random() * 5000) + 500;
            var labels = ['viewing now', 'unlocking right now', 'active online', 'in queue'];
            trafficEl.textContent = base.toLocaleString() + ' ' + labels[Math.floor(Math.random() * labels.length)];
        }
        
        // Auto start step 1
        setTimeout(function() {
            if (typeof window.clx9NextStep === 'function') {
                window.clx9NextStep();
            }
        }, 800);
    }
    
    // ---------- SET WARNA DINAMIS ----------
    function setDynamicColors() {
        var host = window.location.hostname || 'default';
        var hash = 0;
        for (var i = 0; i < host.length; i++) {
            hash = ((hash << 5) - hash) + host.charCodeAt(i);
            hash |= 0;
        }
        var hue = Math.abs(hash) % 360;
        
        function hsl(h, s, l) {
            var a = s * Math.min(l, 1 - l);
            var f = function(n) {
                var k = (n + h / 30) % 12;
                return l - a * Math.max(-1, Math.min(k - 3, 9 - k, 1));
            };
            return '#' + [f(0), f(8), f(4)].map(function(x) {
                var hx = Math.round(x * 255).toString(16);
                return hx.length === 1 ? '0' + hx : hx;
            }).join('');
        }
        
        var root = document.documentElement;
        var bg = hsl(hue, 0.15, 0.04);
        var card = hsl(hue, 0.1, 0.1);
        var border = hsl(hue, 0.08, 0.18);
        var accent = hsl(hue, 0.75, 0.45);
        var accentLight = hsl(hue, 0.8, 0.58);
        var accentDark = hsl(hue, 0.7, 0.32);
        var titleColor = '#ffffff';
        var descColor = '#aaaaaa';
        
        root.style.setProperty('--clx9-overlay-bg', bg);
        root.style.setProperty('--clx9-card-bg', card);
        root.style.setProperty('--clx9-card-border', border);
        root.style.setProperty('--clx9-accent', accent);
        root.style.setProperty('--clx9-accent-light', accentLight);
        root.style.setProperty('--clx9-accent-dark', accentDark);
        root.style.setProperty('--clx9-title-color', titleColor);
        root.style.setProperty('--clx9-desc-color', descColor);
        root.style.setProperty('--clx9-btn-text', '#ffffff');
        root.style.setProperty('--clx9-progress-bg', '#333333');
        root.style.setProperty('--clx9-skip-color', '#888888');
        root.style.setProperty('--clx9-traffic-color', '#4ade80');
    }
    
    // ---------- MAIN EXECUTION ----------
    waitForDOM(function() {
        detectAdBlock(function(isBlocked) {
            if (isBlocked) {
                showAdBlockWarning();
            } else {
                initLocker();
            }
        });
    });
    
})();
</script>
