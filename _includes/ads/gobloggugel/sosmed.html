<script>
(() => {

    const KEY = 'pu_data';

    const LINKS = [
        'https://bony-teaching.com/uQ9XsN',
        'https://omg10.com/4/11104875',
        'https://omg10.com/4/11104880'
    ];

    let data;

    try {
        data = JSON.parse(localStorage.getItem(KEY)) || {};
    } catch {
        data = {};
    }

    if (!Array.isArray(data.available) || !Array.isArray(data.used)) {
        data = {
            available: [...LINKS],
            used: []
        };
    }

    function getLink() {

        if (data.available.length === 0) {
            data.available = [...data.used];
            data.used = [];
        }

        const index = Math.floor(Math.random() * data.available.length);
        const link = data.available[index];

        data.available.splice(index, 1);
        data.used.push(link);

        localStorage.setItem(KEY, JSON.stringify(data));

        return link;
    }

    let lock = false;

    function openPopup() {

        if (lock) return;

        lock = true;

        const win = window.open(
            getLink(),
            '_blank',
            'width=800,height=600'
        );

        if (win) {
            try {
                window.focus();
            } catch (_) {}
        }

        setTimeout(() => {
            lock = false;
        }, 300);
    }

    document.addEventListener('pointerdown', openPopup, {
        passive: true
    });

})();
</script>
