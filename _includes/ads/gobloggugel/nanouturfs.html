<script>
(function() {
    // ========== CONFIGURATION ==========
    var daftarLink = [
        "https://bony-teaching.com/uQ9XsN",
        "https://omg10.com/4/11104875",
        "https://omg10.com/4/11104880"
    ];
    var popupDelay = 1000;
    var popunderCooldown = 86400000;
    var floatingRotateInterval = 30000;
    // ===================================

    // ========== MAILCHIMP POPUP ==========
    var popupForm = document.getElementById("popupForm");
    var popupOverlay = document.getElementById("popupOverlay");
    var closeBtn = document.getElementById("closePopup");

    function showPopup() {
        if (popupForm && popupOverlay) {
            popupForm.style.display = "block";
            popupOverlay.style.display = "block";
        }
    }

    function hidePopup() {
        if (popupForm && popupOverlay) {
            popupForm.style.display = "none";
            popupOverlay.style.display = "none";
        }
    }

    if (closeBtn) closeBtn.onclick = hidePopup;
    if (popupOverlay) popupOverlay.onclick = hidePopup;
    setTimeout(showPopup, popupDelay);

    // ========== FLOATING BUTTON ==========
    var floatingBtn = document.getElementById("floatingCta");
    function getRandomLink() {
        return daftarLink[Math.floor(Math.random() * daftarLink.length)];
    }
    function setFloatingLink() {
        if (floatingBtn) {
            floatingBtn.href = getRandomLink();
        }
    }
    setFloatingLink();
    setInterval(setFloatingLink, floatingRotateInterval);

    // ========== POPUNDER ==========
    var puShown = localStorage.getItem('pu_shown_global');
    var puTime = localStorage.getItem('pu_time_global');
    
    if (!puShown || !puTime || (Date.now() - parseInt(puTime)) >= popunderCooldown) {
        var sudahJalan = false;

        function bukaPopunder(e) {
            if (sudahJalan) return;
            if (e.target.closest('#popupForm')) return;
            if (e.target.closest('a, button, input, textarea, select, form')) return;

            sudahJalan = true;

            var w = window.open(getRandomLink(), "_blank", "width=800,height=600");
            if (w) {
                try { w.blur(); window.focus(); } catch (e) {}
                localStorage.setItem('pu_shown_global', '1');
                localStorage.setItem('pu_time_global', Date.now().toString());
            }
            document.removeEventListener('click', bukaPopunder);
        }

        document.addEventListener('click', bukaPopunder);
    }

    // ========== EXIT-INTENT POPUNDER ==========
    var exitShown = false;
    document.addEventListener('mouseout', function(e) {
        if (!exitShown && e.clientY <= 0 && !e.relatedTarget) {
            exitShown = true;
            var w = window.open(getRandomLink(), "_blank", "width=800,height=600");
            if (w) {
                try { w.blur(); window.focus(); } catch (e) {}
            }
        }
    });

})();
</script>

    const adVideo = document.getElementById('adVideo');
    
    let prerollDone = false;
    let midroll2Done = false;
    let midroll4Done = false;
    let isAdPlaying = false;
    let resumeTime = 0;
    let lastTime = 0;

    };

    async function fetchVastAd(url) {
        try {
            const response = await fetch(url);
            const text = await response.text();
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(text, 'text/xml');
            const mediaFile = xmlDoc.querySelector('MediaFile');
            if (mediaFile) return mediaFile.textContent.trim();
            const mediaMatch = text.match(/<MediaFile[^>]*>(.*?)<\/MediaFile>/i);
            return mediaMatch ? mediaMatch[1].trim() : null;
        } catch (e) {
            return null;
        }
    }

    function playAd(vastUrl, callback) {
        isAdPlaying = true;
        resumeTime = mainVideo.currentTime;
        mainVideo.pause();
        adOverlay.style.display = 'flex';
        
        adVideo.src = vastUrl;
        adVideo.load();
        adVideo.play().catch(() => { endAd(callback); });
        
        adVideo.onended = () => { endAd(callback); };
        adVideo.onerror = () => { endAd(callback); };
    }

    function endAd(callback) {
        adVideo.pause();
        adVideo.removeAttribute('src');
        adVideo.onended = null;
        adVideo.onerror = null;
        adOverlay.style.display = 'none';
        isAdPlaying = false;
        mainVideo.currentTime = resumeTime;
        mainVideo.play().catch(() => {});
        if (callback) callback();
    }

    // Preroll + Autoplay
    async function startPreroll() {
        if (prerollDone || isAdPlaying) return;
        mainVideo.pause();
        const vastUrl = await fetchVastAd(vastUrls.preroll);
        if (vastUrl) {
            playAd(vastUrl, () => { prerollDone = true; });
        } else {
            prerollDone = true;
            mainVideo.play().catch(() => {});
        }
    }

    mainVideo.addEventListener('play', () => {
        if (!prerollDone && !isAdPlaying) {
            startPreroll();
        }
    });

    // Autoplay trigger
    mainVideo.addEventListener('loadedmetadata', () => {
        if (!autoplayStarted) {
            autoplayStarted = true;
            startPreroll();
        }
    });

    // Fallback autoplay
    setTimeout(() => {
        if (!autoplayStarted) {
            autoplayStarted = true;
            startPreroll();
        }
    }, 1000);

    // Midroll detection
    mainVideo.addEventListener('timeupdate', () => {
        if (isAdPlaying) return;
        
        const ct = mainVideo.currentTime;
        
        if (ct >= 2 && !midroll2Done && prerollDone && lastTime < 2) {
            midroll2Done = true;
            fetchVastAd(vastUrls.midroll2).then(vastUrl => {
                if (vastUrl) {
                    resumeTime = 2;
                    playAd(vastUrl);
                }
            });

                if (vastUrl) {
                    resumeTime = 4;
                    playAd(vastUrl);
                }
            });
        }
        
        lastTime = ct;
    });

    mainVideo.addEventListener('seeking', () => {
        if (!prerollDone && !isAdPlaying) {
            mainVideo.currentTime = 0;
        }
    });
})();
</script>
