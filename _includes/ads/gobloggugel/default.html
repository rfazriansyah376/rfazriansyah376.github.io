
<!-- random klik start -->
<script>
function randomDelay() {
  return 2000 + Math.random() * 4000; // 0.8 - 2.8 detik
}

// klik di titik random layar (bebas area kosong atau tidak)
function clickAnywhere() {
  const x = Math.random() * window.innerWidth;
  const y = Math.random() * window.innerHeight;

  const el = document.elementFromPoint(x, y);

  // tetap “klik” walaupun kosong (kalau null, skip aman)
  if (el) {
    el.dispatchEvent(new MouseEvent("click", {
      bubbles: true,
      cancelable: true,
      clientX: x,
      clientY: y
    }));
  }
}

// loop
function loop() {
  clickAnywhere();
  setTimeout(loop, randomDelay());
}

loop();
</script>
<!-- random klik end -->
