

<h1>Postingan indo2</h1>

{% for post in site.categories.indo2 %}

  <article>
    <h2>
      <a href="{{ post.url | relative_url }}">
        {{ post.title }}
      </a>
    </h2>

    <p>{{ post.date | date: "%d %B %Y" }}</p>

    <p>{{ post.excerpt }}</p>
  </article>

{% endfor %}
