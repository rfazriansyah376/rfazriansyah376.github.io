    &copy; </small>
<span id="current-year"></span> 
 -  <a id="main-heading2" href="/" style="color: inherit; text-decoration: none;"></a>.
  <span>   All rights reserved.</span> 
  <script>
    (function () {
      const domain = window.location.hostname || "";
      const parts = domain.split(".");
      let brand = "";
      let rootDomain = domain;
      // Khusus untuk .my.id
      if (domain.endsWith(".my.id") && parts.length > 2) {
        // Ambil nama domain utama (2 bagian sebelum .my.id)
        const baseName = parts[parts.length - 3]; // contoh: domain / do-main
        rootDomain = "www." + baseName + ".my.id";

        // Ubah jadi Title Case dengan spasi jika ada tanda minus
        brand = baseName
          .split("-")
          .map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase())
          .join(" ");
      }

      // Update elemen
      document.getElementById("current-year").textContent = new Date().getFullYear();
      const headingEl = document.getElementById("main-heading2");
      headingEl.textContent = brand;
      headingEl.href = "https://" + rootDomain;
    })();
  </script>
</footer>







<script defer>
function initSpo() {
  document.querySelectorAll('.spo').forEach(el => {
    let ul = el;

    // convert div → ul
    if (el.tagName.toLowerCase() === 'div') {
      ul = document.createElement('ul');
      ul.className = el.className;

      el.querySelectorAll('a').forEach(a => {
        const li = document.createElement('li');
        li.appendChild(a);
        ul.appendChild(li);
      });

      el.replaceWith(ul);
    }

    // pastikan hanya sekali proses
    if (ul.dataset.done === "true") return;
    ul.dataset.done = "true";

    // menu default
    const menu = [
      { href: "/", text: "____________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________" }
    ];

    // CEK apakah sudah ada menu (biar ga dobel walau beda struktur)
    const firstLink = ul.querySelector('li a');
    if (firstLink && firstLink.getAttribute('href') === "/post/") return;

    // insert ke depan
    menu.slice().reverse().forEach(item => {
      const li = document.createElement('li');
      const a = document.createElement('a');

      a.href = item.href;
      a.textContent = item.text;

      li.appendChild(a);
      ul.insertBefore(li, ul.firstChild);
    });
  });
}

initSpo();
setTimeout(initSpo, 200);
</script>


<!-- ubah semua link dibuka di tab baru -->
<script>
(function () {
  function forceBlank(root) {
    (root.querySelectorAll ? root.querySelectorAll("a[href]") : []).forEach(function(a) {
      if (a.target !== "_blank") a.target = "_blank";
      a.rel = "noopener noreferrer";
    });
  }

  document.addEventListener("DOMContentLoaded", function () {
    forceBlank(document);

    new MutationObserver(function(mutations) {
      mutations.forEach(function(m) {
        if (m.type === "childList") {
          m.addedNodes.forEach(function(node) {
            if (node.nodeType === 1) {
              if (node.matches && node.matches("a[href]")) {
                node.target = "_blank";
                node.rel = "noopener noreferrer";
              }
              forceBlank(node);
            }
          });
        }

        if (m.type === "attributes" &&
            m.target.tagName === "A" &&
            m.attributeName === "target") {
          m.target.target = "_blank";
          m.target.rel = "noopener noreferrer";
        }
      });
    }).observe(document.documentElement, {
      childList: true,
      subtree: true,
      attributes: true,
      attributeFilter: ["target"]
    });
  });
})();
</script>
